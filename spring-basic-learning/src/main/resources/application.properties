spring.application.name=spring-basic-learning

# Database URL
spring.datasource.url=jdbc:mysql://localhost:3306/example_db?useSSL=false&serverTimezone=UTC
# Database credentials
spring.datasource.username=root
spring.datasource.password=Admin@26121707

# MySQL Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings (if using Spring Data JPA)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.default_schema=example_db

#############################Servlet Context Path######################################
server.servlet.context-path=/spring-basic-learning


########################################Server Config##################################
server.url=http://localhost:8080/spring-basic-learning
server.port=8080

#spring.profiles.active=dev


###########################################Logging Info#################################
logging.file.name=logs/application.log
logging.level.root=INFO
logging.level.org.springframework.web=ERROR
logging.level.com.example.spring_basic.learning=DEBUG
logging.level.org.hibernate.SQL=DEBUG

######################################Actuator Config####################################
#management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=*

